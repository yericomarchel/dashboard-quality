<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Project Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        h2 {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            color: #f2f2f2;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 20px;
            border-radius: 5px;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body>

    <h2>Dashboard Quality</h2>
    <img id="dashboardImg" src="slide0.png" alt="Memuat Dashboard...">

    <script>
        const totalSlides = 6; // Total 6 slide (Slide 2 sampai Slide 7)
        let currentSlide = 0;
        const intervalTime = 60000; // 1 Menit

        function changeSlide() {
            currentSlide = (currentSlide + 1) % totalSlides;
            const imgElement = document.getElementById('dashboardImg');
            
            // Efek fade out singkat sebelum ganti gambar
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                // Tambahkan timestamp agar browser selalu mengambil gambar terbaru dari server
                imgElement.src = `slide${currentSlide}.png?t=` + new Date().getTime();
                imgElement.style.opacity = 1;
            }, 500); // Tunggu setengah detik saat gelap
        }

        setInterval(changeSlide, intervalTime);
    </script>
</body>
</html>

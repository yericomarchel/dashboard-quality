<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Project Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 15px;
        }
        h2 {
            color: #f2f2f2;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 5px;
        }
        .slide-counter {
            color: #f2c811; /* Warna kuning Power BI */
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 5px;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="header-overlay">
        <h2>Dashboard Quality</h2>
        <div id="slideCounter" class="slide-counter">Slide 1 / 6</div>
    </div>
    
    <img id="dashboardImg" src="slide0.png" alt="Memuat Dashboard...">

    <script>
        // ==========================================
        // 1. FITUR ANTI-LAYAR MATI (WAKE LOCK API)
        // ==========================================
        let wakeLock = null;
        
        async function keepScreenAwake() {
            try {
                // Cek apakah browser TV mendukung fitur ini
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock aktif! Layar tidak akan mati.');
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock terlepas, mencoba mengaktifkan kembali...');
                    });
                }
            } catch (err) {
                console.error(`Gagal menahan layar menyala: ${err.name}, ${err.message}`);
            }
        }

        // Jalankan saat pertama kali dibuka
        keepScreenAwake();
        
        // Pastikan tetap menyala jika halaman sempat tidak fokus
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                keepScreenAwake();
            }
        });


        // ==========================================
        // 2. LOGIKA ROTASI SLIDESHOW GAMBAR
        // ==========================================
        const totalSlides = 6; 
        let currentSlide = 0;
        const intervalTime = 60000; // Pindah gambar setiap 1 Menit (60000 milidetik)

        function changeSlide() {
            // Naikkan angka slide, kembali ke 0 jika sudah mencapai batas akhir
            currentSlide = (currentSlide + 1) % totalSlides;
            
            const imgElement = document.getElementById('dashboardImg');
            const counterElement = document.getElementById('slideCounter');
            
            // Buat gambar memudar (fade out)
            imgElement.style.opacity = 0;
            
            // Tunggu setengah detik saat gelap, lalu ganti gambar dan teks
            setTimeout(() => {
                // Parameter ?t= digunakan agar TV tidak memakai gambar lawas (cache)
                imgElement.src = `slide${currentSlide}.png?t=` + new Date().getTime();
                counterElement.innerText = `Slide ${currentSlide + 1} / ${totalSlides}`;
                
                // Munculkan kembali gambar (fade in)
                imgElement.style.opacity = 1;
            }, 500); 
        }

        // Jalankan fungsi rotasi secara berulang
        setInterval(changeSlide, intervalTime);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Quality - Full Screen TV (7 Slides)</title>
    <style>
        /* Menghilangkan semua scrollbar dan margin default browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Judul melayang di pojok kiri atas */
        h2 { 
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 100;
            color: #f2f2f2; 
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.4); 
            padding: 5px 15px;
            border-radius: 5px;
            pointer-events: none; 
        }

        /* Area Dashboard Full Screen */
        .dashboard-content {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Animasi Transisi Halus */
        .tab-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease-in-out;
        }

        .tab-panel.active {
            opacity: 1;
            visibility: visible;
            z-index: 1;
            animation: fadeInScale 1.5s ease-in-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(1.005); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

        </div>

    <script>
        let currentSlide = 0;
        const totalSlides = 7; // Diubah menjadi 7 slide
        const intervalTime = 60000; // Berpindah setiap 60 Detik

        function nextSlide() {
            const panels = document.getElementsByClassName("tab-panel");
            
            // Hapus class active dari slide lama
            panels[currentSlide].classList.remove("active");

            // Tentukan index slide berikutnya
            currentSlide = (currentSlide + 1) % totalSlides;

            // Tambahkan class active ke slide baru
            panels[currentSlide].classList.add("active");
        }

        // Jalankan transisi otomatis
        setInterval(nextSlide, intervalTime);

        // --- FITUR WAKE LOCK (MENCEGAH LAYAR MATI) ---
        let wakeLock = null;

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock aktif!');
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock terlepas.');
                    });
                }
            } catch (err) {
                console.log(`Wake Lock Error: ${err.name}, ${err.message}`);
            }
        }

        requestWakeLock();

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });
    </script>

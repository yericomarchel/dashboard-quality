<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Project Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .header-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 15px;
        }
        h2 {
            color: #f2f2f2;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 5px;
        }
        .slide-counter {
            color: #f2c811; /* Warna kuning Power BI */
            font-weight: bold;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 20px;
            border-radius: 5px;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="header-overlay">
        <h2>Dashboard Quality</h2>
        <div id="slideCounter" class="slide-counter">Slide 1 / 6</div>
    </div>
    
    <img id="dashboardImg" src="slide0.png" alt="Memuat Dashboard...">

    <script>
        const totalSlides = 6; 
        let currentSlide = 0;
        const intervalTime = 60000; // 1 Menit

        function changeSlide() {
            // Logika loop yang rapi: 0 -> 1 -> 2 -> 3 -> 4 -> 5 -> kembali ke 0
            currentSlide = (currentSlide + 1) % totalSlides;
            const imgElement = document.getElementById('dashboardImg');
            const counterElement = document.getElementById('slideCounter');
            
            imgElement.style.opacity = 0;
            
            setTimeout(() => {
                imgElement.src = `slide${currentSlide}.png?t=` + new Date().getTime();
                counterElement.innerText = `Slide ${currentSlide + 1} / ${totalSlides}`;
                imgElement.style.opacity = 1;
            }, 500); 
        }

        setInterval(changeSlide, intervalTime);
    </script>
</body>
</html>
